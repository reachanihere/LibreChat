name: Azure Deploy
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure the VM is running (it may be in the nightly window)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Start VM if deallocated
        run: az vm start -g ${{ secrets.AZ_RG }} -n ${{ secrets.AZ_VM }} || true

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest main + recreate changed containers
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /mnt/data/LibreChat
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          docker compose -f deploy-compose.yml -f docker-compose.override.yml pull
          docker compose -f deploy-compose.yml -f docker-compose.override.yml up -d
          docker image prune -f
          REMOTE

      - name: Smoke-check the public endpoint
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.SSH_HOST }}/api/config || true)
            [ "$code" = "200" ] && echo "deploy OK" && exit 0
            echo "waiting ($code)"; sleep 6
          done
          echo "deploy smoke check failed" >&2; exit 1
