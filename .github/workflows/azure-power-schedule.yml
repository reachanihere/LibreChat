name: Azure Power Schedule

# Reconcile the VM's power state to the Dublin downtime window instead of
# edge-triggering on exact hours. GitHub's scheduled crons routinely land
# hours late (or are dropped), and the old exact-hour gate (HOUR == "02")
# turned every late run into a silent no-op — so the VM never went down.
# Each run here computes the *desired* state from the real Dublin clock and
# drives the VM toward it, so a run that lands anywhere inside the window
# still deallocates, and any run outside it still ensures the VM is up.

on:
  schedule:
    # Off-peak minutes (deliberately NOT :00/:15/:30/:45). GitHub's scheduler is
    # busiest at the top of the hour, which is the main cause of late/dropped
    # scheduled runs — odd minutes dodge that congestion. ~15-min cadence; the
    # reconciler still converges even if individual runs are skipped or delayed.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "auto = reconcile to the Dublin schedule; start/deallocate = force"
        required: false
        default: auto
        type: choice
        options: [auto, start, deallocate]
      dry_run:
        description: "Print the decision but do not change VM power"
        required: false
        default: false
        type: boolean

concurrency:
  group: azure-power
  cancel-in-progress: false

jobs:
  power:
    runs-on: ubuntu-latest
    steps:
      - name: Decide desired power state
        id: decide
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode }}"
          MODE="${MODE:-auto}"
          if [ "$MODE" = "start" ]; then
            echo "desired=running" >> "$GITHUB_OUTPUT"
          elif [ "$MODE" = "deallocate" ]; then
            echo "desired=deallocated" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(TZ=Europe/Dublin date +%H)
            echo "Dublin hour: $HOUR (downtime window is 02:00-08:00, DST-aware)"
            # 10# forces base-10 so a leading-zero hour like 08 isn't parsed as octal.
            if [ "$((10#$HOUR))" -ge 2 ] && [ "$((10#$HOUR))" -lt 8 ]; then
              echo "desired=deallocated" >> "$GITHUB_OUTPUT"
            else
              echo "desired=running" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Reconcile VM power
        env:
          DESIRED: ${{ steps.decide.outputs.desired }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          AZ_RG: ${{ secrets.AZ_RG }}
          AZ_VM: ${{ secrets.AZ_VM }}
        run: |
          set -euo pipefail
          CURRENT=$(az vm get-instance-view -g "$AZ_RG" -n "$AZ_VM" \
            --query "instanceView.statuses[?starts_with(code,'PowerState')].code | [0]" \
            -o tsv 2>/dev/null || echo "PowerState/unknown")
          CURRENT="${CURRENT#PowerState/}"
          DRY_RUN="${DRY_RUN:-false}"
          echo "desired=$DESIRED current=$CURRENT dry_run=$DRY_RUN"

          action=""
          if [ "$DESIRED" = "deallocated" ]; then
            case "$CURRENT" in
              deallocated|deallocating) echo "already $CURRENT — noop"; exit 0 ;;
              *) action="deallocate" ;;
            esac
          else
            case "$CURRENT" in
              running|starting) echo "already $CURRENT — noop"; exit 0 ;;
              *) action="start" ;;
            esac
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "[dry-run] would run: az vm $action  ($CURRENT -> $DESIRED)"
            exit 0
          fi
          az vm "$action" -g "$AZ_RG" -n "$AZ_VM"
          echo "applied: az vm $action  ($CURRENT -> $DESIRED)"
