name: Azure Upstream Sync
on:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge upstream into a sync branch
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/danny-avila/LibreChat.git
          git fetch upstream main
          BRANCH="upstream-sync/$(git rev-parse --short upstream/main)"
          git checkout -B "$BRANCH" origin/main
          if git merge --no-edit upstream/main; then
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit --no-edit || true
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
          fi
          git push -f origin "$BRANCH"

      - name: Open / update the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Upstream sync: ${{ steps.merge.outputs.branch }}"
          BODY="Automated weekly merge of danny-avila/LibreChat@main."
          if [ "${{ steps.merge.outputs.conflicts }}" = "true" ]; then
            BODY="$(printf '%s\n\n%s' "$BODY" '⚠️ **Merge conflicts were committed as-is — resolve before merging.**')"
          fi
          gh pr create --base main --head "${{ steps.merge.outputs.branch }}" \
            --title "$TITLE" --body "$BODY" 2>/dev/null \
            || gh pr edit "${{ steps.merge.outputs.branch }}" --title "$TITLE" --body "$BODY"
