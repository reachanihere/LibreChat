version: 1.3.5
cache: true

# All models are served through the GitHub Copilot gateway (one PAT, shared headers).
# Each endpoint is structured around the gateway API surface its models need:
#   - Claude  → native Anthropic /v1/messages (provider: anthropic) — accepts PDF + images
#   - GPT     → Responses API /responses (useResponsesApi) — gpt-5.5 (Responses-only) + gpt-5.4, accepts PDF + images
#   - GPT 4o  → OpenAI-style /chat/completions — gpt-4o / gpt-4o-mini, images + text only (gateway blocks PDF)
#   - Gemini  → OpenAI-style /chat/completions — images + text only (gateway blocks PDF)
# Native PDF is gated per-model by the gateway: only the Anthropic and Responses
# surfaces accept it, which is why Claude and gpt-5.x get it but gpt-4o/Gemini can't.
# Integrator-restricted models (e.g. claude-opus-4.7-1m-internal) remain omitted.
#
# To add/remove a model: edit the `models.default` list for the relevant endpoint,
# commit, and push (auto-deploys). Validate a new model first with:
#   curl https://api.githubcopilot.com/chat/completions -H "Authorization: Bearer $PAT" \
#        -H 'Editor-Version: vscode/1.95.0' -H 'Copilot-Integration-Id: vscode-chat' \
#        -d '{"model":"<id>","messages":[{"role":"user","content":"OK"}],"max_completion_tokens":50}'

endpoints:
  custom:
    - name: "Claude (Copilot)"
      apiKey: "${COPILOT_PAT}"
      baseURL: "https://api.githubcopilot.com"
      # `provider: anthropic` routes this endpoint through the native Anthropic
      # client (the gateway's /v1/messages surface) instead of the OpenAI-style
      # /chat/completions. That native surface is what accepts PDF `document`
      # blocks, so every Claude model here can now read PDFs (and images).
      provider: anthropic
      headers:
        Editor-Version: "vscode/1.95.0"
        Copilot-Integration-Id: "vscode-chat"
        # The Anthropic SDK authenticates with an `x-api-key` header, but the
        # Copilot gateway requires `Authorization: Bearer` and 400s on x-api-key
        # alone ("missing required Authorization header"). Forcing Bearer here
        # via the admin headers (which merge into the client's defaultHeaders and
        # win) makes the native path authenticate. ${COPILOT_PAT} is expanded in
        # header values at request time. Without this line every Claude call 401s.
        Authorization: "Bearer ${COPILOT_PAT}"
      models:
        default:
          - "claude-opus-4.8"
          - "claude-opus-4.7"
          - "claude-opus-4.6"
          - "claude-sonnet-4.6"
          - "claude-sonnet-4.5"
          - "claude-haiku-4.5"
        fetch: false
      titleConvo: true
      titleModel: "claude-haiku-4.5"
      modelDisplayLabel: "Claude"
      # Pin each model's context window to the gateway's real limits. LibreChat's
      # built-in token map keys models with HYPHENS (claude-opus-4-8) but the
      # Copilot gateway IDs use DOTS (claude-opus-4.8), so its substring matcher
      # misses and falls back to 200k — capping usable context far below the real
      # 1M. An exact-keyed tokenConfig short-circuits the matcher. prompt/completion
      # are 0 because usage is flat-rate via Copilot, not billed per token.
      tokenConfig:
        "claude-opus-4.8":   { context: 1000000, prompt: 0, completion: 0 }
        "claude-opus-4.7":   { context: 1000000, prompt: 0, completion: 0 }
        "claude-opus-4.6":   { context: 1000000, prompt: 0, completion: 0 }
        "claude-sonnet-4.6": { context: 1000000, prompt: 0, completion: 0 }
        "claude-sonnet-4.5": { context: 200000,  prompt: 0, completion: 0 }
        "claude-haiku-4.5":  { context: 200000,  prompt: 0, completion: 0 }
      # No `addParams: reasoning_effort` here: addParams overrides the user's
      # per-conversation pick unconditionally, so forcing it would make the effort
      # slider in the UI a dead control. With it omitted, the built-in default is
      # `unset` (the model reasons at its gateway default) and the user can dial
      # effort per conversation.
      # (No dropParams: on the native Anthropic path, dropParams only filters
      # Anthropic-native keys, so the old frequency_penalty/presence_penalty
      # entries were a dead no-op — those OpenAI keys are never emitted here.)

    # GPT splits into two endpoints by API surface. gpt-5.5 and gpt-5.4 are
    # served via the Responses API (/responses): that surface accepts PDF
    # `input_file` blocks (native PDF) AND is the ONLY way to reach gpt-5.5,
    # which the gateway exposes as Responses-only. gpt-4o / gpt-4o-mini reject
    # the Responses API, so they stay on the OpenAI-style /chat/completions
    # endpoint below (images + text only — the gateway cannot do PDF for them).
    - name: "GPT (Copilot)"
      apiKey: "${COPILOT_PAT}"
      baseURL: "https://api.githubcopilot.com"
      headers:
        Editor-Version: "vscode/1.95.0"
        Copilot-Integration-Id: "vscode-chat"
      models:
        default:
          - "gpt-5.5"
          - "gpt-5.4"
        fetch: false
      titleConvo: true
      # gpt-5.5 is Responses-only and not suited to title calls; gpt-5.4 handles them.
      titleModel: "gpt-5.4"
      modelDisplayLabel: "GPT"
      # Route this endpoint to the gateway's /responses surface. This both unlocks
      # native PDF (input_file blocks) and enables gpt-5.5 at all. On this path
      # max_completion_tokens becomes max_output_tokens and max_tokens is never
      # emitted, so the old `dropParams: [max_tokens]` is unnecessary here.
      addParams:
        useResponsesApi: true
      tokenConfig:
        "gpt-5.5": { context: 1050000, prompt: 0, completion: 0 }
        "gpt-5.4": { context: 1050000, prompt: 0, completion: 0 }

    # gpt-4o / gpt-4o-mini: OpenAI-style /chat/completions. They reject the
    # Responses API, so they're split off from gpt-5.x. Images + text-file drop
    # work; PDF does NOT (the gateway blocks native PDF for these models, and we
    # deliberately don't add a RAG fallback). `max_tokens` is dropped because the
    # gateway wants max_completion_tokens.
    - name: "GPT 4o (Copilot)"
      apiKey: "${COPILOT_PAT}"
      baseURL: "https://api.githubcopilot.com"
      headers:
        Editor-Version: "vscode/1.95.0"
        Copilot-Integration-Id: "vscode-chat"
      models:
        default:
          - "gpt-4o"
          - "gpt-4o-mini"
        fetch: false
      titleConvo: true
      titleModel: "gpt-4o-mini"
      modelDisplayLabel: "GPT 4o"
      tokenConfig:
        "gpt-4o":       { context: 128000,  prompt: 0, completion: 0 }
        "gpt-4o-mini":  { context: 128000,  prompt: 0, completion: 0 }
      dropParams:
        - "max_tokens"

    - name: "Gemini (Copilot)"
      apiKey: "${COPILOT_PAT}"
      baseURL: "https://api.githubcopilot.com"
      headers:
        Editor-Version: "vscode/1.95.0"
        Copilot-Integration-Id: "vscode-chat"
      models:
        default:
          - "gemini-3.1-pro-preview"
          - "gemini-3.5-flash"
          - "gemini-2.5-pro"
        fetch: false
      titleConvo: true
      titleModel: "gemini-3.5-flash"
      modelDisplayLabel: "Gemini"
      # gemini-2.5-pro is the inverse of the dot/hyphen trap: the gateway caps it
      # at 128k, but LibreChat's built-in map assumes Gemini's native 1M+, so it
      # would over-fill the context and the gateway would hard-reject. Pin all
      # three to the gateway's real limits.
      tokenConfig:
        "gemini-3.1-pro-preview": { context: 1000000, prompt: 0, completion: 0 }
        "gemini-3.5-flash":       { context: 1000000, prompt: 0, completion: 0 }
        "gemini-2.5-pro":         { context: 128000,  prompt: 0, completion: 0 }
